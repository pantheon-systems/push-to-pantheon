name: Shellcheck
on:
  push:
    branches:
      - 0.x
      - 1.x
    paths:
      - '/scripts/**'

jobs:
  shellcheck:
    name: Run Shellcheck on Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run Shellcheck
        run: shellcheck scripts/*.sh