name: Create Release

on:
  # Trigger when a PR with "release" label is merged to 0.x
  pull_request_target:
    types: [closed]
    branches:
      - 0.x

  # Keep manual trigger as backup
  workflow_dispatch:
    inputs:
      version:
        description: 'The version to release (e.g., 0.9.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: 'Create Draft Release'
    runs-on: ubuntu-latest
    # Only run if PR was merged and has release label, OR manual trigger
    if: |
      (github.event_name == 'pull_request_target' && github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: 0.x
          fetch-depth: 0

      - name: Extract version from PR title or input
        id: version
        run: |
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            # Extract version from "Release X.Y.Z" PR title
            VERSION=$(echo "${{ github.event.pull_request.title }}" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
            if [ -z "$VERSION" ]; then
              echo "Error: Could not extract version from PR title '${{ github.event.pull_request.title }}'"
              exit 1
            fi
            echo "source=pr_title" >> $GITHUB_OUTPUT
          else
            # Use manual input
            VERSION="${{ github.event.inputs.version }}"
            echo "source=manual" >> $GITHUB_OUTPUT
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Will create release for version: $VERSION (from ${{ steps.version.outputs.source }})"

      - name: Get previous version tag
        id: get_version
        run: |
          # Get the latest tag from the repository
          PREVIOUS_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          echo "previous_version=$PREVIOUS_VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Check versions in README.md
        run: |
          # If the previous version is found in the README.md, exit with an error.
          PREVIOUS_VERSION_ESCAPED=$(echo "${{ steps.get_version.outputs.previous_version }}" | sed 's/\./\\./g')
          if grep -q "$PREVIOUS_VERSION_ESCAPED" readme.md; then
            echo "Error: Previous version '${{ steps.get_version.outputs.previous_version }}' found in README.md"
            echo "The release PR should have updated all version references."
            exit 1
          fi
        shell: bash

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
        shell: bash

      - name: Create and push Git tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "$VERSION"
          git push origin "$VERSION"
        shell: bash

      - name: Create GitHub Draft Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            --draft

          echo "✅ Draft release $VERSION created successfully"
          echo "Visit https://github.com/${{ github.repository }}/releases to review and publish it"
        shell: bash

      - name: Comment on merged PR
        if: github.event_name == 'pull_request_target'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "🎉 Draft release [\`$VERSION\`](https://github.com/${{ github.repository }}/releases/tag/$VERSION) has been created automatically.

          Review and publish the release at: https://github.com/${{ github.repository }}/releases"