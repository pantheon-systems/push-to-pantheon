name: Deploy PR to Pantheon

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

on:
  pull_request_target:
    types: [opened, synchronize]
    paths:
      - '.github/testing_fixtures/**'
      - 'action.yml'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Which test suite(s) to run'
        type: choice
        options:
          - all
          - standard
          - content
          - git
          - terminus
          - advanced
          - build-tools-advanced
        default: all

jobs:
  run_test_suites:
    name: Run Test Suites
    # This workflow uses `pull_request_target` to gain access to secrets, which
    # are not available on normal `pull_request` events for forks.
    # The two-step checkout process is handled within the reusable test-suites workflow.
    permissions:
      deployments: write
      contents: write
      pull-requests: read
    uses: ./.github/workflows/test-suites.yml
    with:
      env_prefix: ${{ github.event.pull_request.number || 'manual' }}
      suite: ${{ github.event_name == 'workflow_dispatch' && inputs.suite || 'all' }}
    secrets:
      PANTHEON_SSH_KEY: ${{ secrets.PANTHEON_SSH_KEY }}
      PANTHEON_MACHINE_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}

  cleanup:
    name: Cleanup Test Environments
    needs: run_test_suites
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Terminus
        uses: pantheon-systems/terminus-github-actions@v1
        with:
          pantheon-machine-token: ${{ secrets.PANTHEON_MACHINE_TOKEN }}

      - name: Cleanup environments
        env:
          PANTHEON_MACHINE_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
          PANTHEON_SITE: dtp-nearly-empty-site
          ENV_PREFIX: ${{ github.event.pull_request.number || 'manual' }}
          DELETE_OLD_MULTIDEVS: true
        run: bash scripts/main.sh cleanup
