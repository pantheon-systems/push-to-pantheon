name: BATS Tests

on:
  push:
    paths:
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/bats-tests.yml'

concurrency:
  group: bats-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: read

jobs:
  fast-tests:
    name: Fast Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install BATS
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run fast tests
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # Run tests that don't require Pantheon infrastructure
          bats --jobs 4 tests/01-main.bats tests/02-get_target_env.bats tests/02b-commit_message.bats tests/03-permissions.bats tests/04-ssh_setup.bats

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install BATS
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Install Terminus
        uses: pantheon-systems/terminus-github-actions@v1
        with:
          pantheon-machine-token: ${{ secrets.PANTHEON_MACHINE_TOKEN }}

      - name: Install Terminus Build Tools
        run: |
          terminus self:plugin:install pantheon-systems/terminus-build-tools-plugin
          # Verify installation
          terminus self:plugin:list --fields=name,installed_version | grep terminus-build-tools-plugin

      - name: Create test environment
        id: test_env
        env:
          PANTHEON_MACHINE_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
          PANTHEON_SITE: dtp-nearly-empty-site
          SOURCE_ENV: live
          MULTIDEV_PREFIX: bats-
          GITHUB_SHA: ${{ github.sha }}
        run: |
          # Compute multidev name using helper function (uses commit hash for uniqueness)
          TEST_ENV=$(bash scripts/main.sh compute_multidev_name)
          echo "TEST_ENV=${TEST_ENV}" >> $GITHUB_OUTPUT

          # Create multidev using main.sh function
          bash scripts/main.sh create_multidev "${TEST_ENV}"

      - name: Run Pantheon integration tests
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PANTHEON_MACHINE_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
          PANTHEON_SSH_KEY: ${{ secrets.PANTHEON_SSH_KEY }}
          PANTHEON_TEST_SITE: dtp-nearly-empty-site
          PANTHEON_TEST_ENV: ${{ steps.test_env.outputs.TEST_ENV }}
        run: |
          # Run tests that interact with Pantheon (slower integration tests)
          bats --jobs 4 tests/05-build_tools.bats tests/06a-create-from-live.bats tests/06b-create-from-dev.bats tests/06c-validation-and-delete.bats tests/07-site_root.bats tests/08-push_pantheon.bats tests/09-cleanup.bats

      - name: Install Terminus Build Tools Plugin
        if: always()
        run: terminus self:plugin:install pantheon-systems/terminus-build-tools-plugin

      - name: Cleanup test environments
        if: always()
        env:
          PANTHEON_MACHINE_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
          PANTHEON_SITE: dtp-nearly-empty-site
          PANTHEON_TARGET_ENV: ${{ steps.test_env.outputs.TEST_ENV }}
          DELETE_OLD_MULTIDEVS: true
          MULTIDEV_DELETE_PATTERN: 'bats-'
          MULTIDEV_AGE_THRESHOLD_DAYS: 0
          GITHUB_TOKEN: ${{ github.token }}
          CI_PROJECT_USERNAME: ${{ github.repository_owner }}
          CI_PROJECT_REPONAME: ${{ github.event.repository.name }}
        run: bash scripts/main.sh cleanup
