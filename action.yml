name: Push to Pantheon
description: A GitHub Action that deploys code to Pantheon Dev and Multidev environments
branding:
  icon: activity
  color: yellow
inputs:
  ssh_key:
    description: 'A private key that corresponds to a public key on Pantheon: https://docs.pantheon.io/ssh-keys'
    required: true

  machine_token:
    description: "A token for authenticating with Pantheon's command line: https://docs.pantheon.io/machine-tokens"
    required: true

  site:
    description: 'The machine name of your Pantheon site.'
    required: true

  target_env:
    description: 'The Pantheon environment to which the deployment will be made. If left blank, the value used will be automatically derived. Pull requests will deploy to environments named "pr-[NUMBER]" and main/master branch commits will deploy to the Pantheon "dev" environment'
    required: false
    default: ""

  source_env:
    description: "The environment from which the database and uploaded files will be copied."
    required: false
    default: "live"

  clone_content:
    description: "If set to true, the database and files directory will be re-cloned from the source environment. When set to false, this data is only copied upon Multidev creations. Setting this variable to true ensures fresh content but adds time to the build process that can be prohibitive for sites with large databases."
    required: false
    default: false
    type: boolean

  delete_old_environments:
    description: "If set to true, Multidev environments associated with closed pull requests will be deleted after deployment completes. It is recommended to set this parameter to true for workflows that run after merges to the main branch."
    required: false
    default: false
    type: boolean

  git_user_name:
    description: "The name to be used with the Git commit that will be pushed to Pantheon. This value is not used on newer 'eVCS' sites for which there is no Pantheon-provided Git repo."
    required: false
    default: "Pantheon Automation"

  git_user_email:
    description: "The email address to be used with the Git commit that will be pushed to Pantheon. This value is not used on newer 'eVCS' sites for which there is no Pantheon-provided Git repo."
    required: false
    default: "bot@getpantheon.com"

  git_commit_message:
    description: "A custom commit message to be used with the Git commit that will be pushed to Pantheon. Leaving this Action parameter blank will result in a generic commit message being used. This value is not used on newer 'eVCS' sites for which there is no Pantheon-provided Git repo."
    required: false
    default: ""

  relative_site_root:
    description: "The root directory of the site to be deployed relative to the repository root. The vast majority of users of this action should leave this value unchanged from the default. The action will use this value to change directories after checking out the repo."
    required: false
    default: ""

  skip_terminus_install:
    description: "If set to true, the action will skip the installation of Terminus. This is useful if you are using a custom Docker image that already has Terminus installed or you are installing it earlier in the workflow. By default, the action will check for the presence of Terminus and install it if it is not found, but if this is set to true, the action will bypass the check and skip the Terminus install."
    required: false
    default: false
    type: boolean

  build_tools_version:
    description: "The version of the Terminus Build Tools plugin to install. By default, the action will install the latest stable version. You can specify a specific version or branch if needed."
    required: false
    type: string
    default: ""

  skip_build_tools:
    description: "If set to true, the action will skip the installation of the Terminus Build Tools plugin and will not use it to create Multidev environments or push code. This is useful if you just want to push the code and are not interested in syncing the database and files as part of your deploy process. By default, the action will install and use the Build Tools plugin unless this is set to true."
    required: false
    default: false
    type: boolean

  # todo checkout_repo:
  #   description: "A boolean for whether or not this composite step should checkout the git repo. Set to false if a checkout has already been perf"

runs:
    using: 'composite'
    steps:

      - name: Set target_env
        id: set_target_env
        shell: bash
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          INPUT_TARGET_ENV: ${{ inputs.target_env }}
        run: |
          # Set target_env
          TARGET_ENV=$(${{ github.workspace }}/scripts/main.sh get_target_env)
          # Check if the result of get_target_env was an exit 1 code.
          if [ $? -ne 0 ]; then
              echo "Error: you must set the 'target_env' parameter when running this action on a branch that is not 'main' or 'master' or when not executing a workflow in a pull request."
              exit 1
          fi

          echo "PANTHEON_TARGET_ENV set to ${TARGET_ENV}"
          echo "PANTHEON_TARGET_ENV=${TARGET_ENV}" >> $GITHUB_ENV

      - name: Set clone content flag
        shell: bash
        env:
          CLONE_CONTENT: ${{ inputs.clone_content }}
        run: |
          # Set clone content flag
          set +e
          if [ "$CLONE_CONTENT" == "true" ]; then
            export CLONE_CONTENT_FLAG="--clone-content"
            echo "Content will be cloned again if the target environment already exists"
          else
            export CLONE_CONTENT_FLAG=""
            echo "Content will NOT be cloned again if the target environment already exists"
          fi

          echo "PANTHEON_CLONE_CONTENT_FLAG=${CLONE_CONTENT_FLAG}" >> $GITHUB_ENV

      - name: Check required permissions
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Check if we have the required workflow permissions

          echo "Checking GitHub workflow permissions..."
          MISSING_PERMISSIONS=(${{ github.workspace }}/scripts/main.sh check_missing_permissions)

          # If any permissions are missing, show error and exit
          if [ ${#MISSING_PERMISSIONS[@]} -gt 0 ]; then
            ${{ github.workspace }}/scripts/main.sh get_missing_permissions_help "${MISSING_PERMISSIONS[@]}"
            exit 1
          fi

          echo "✅ All required permissions are properly configured"

      - name: Start deployment
        uses: bobheadxi/deployments@v1
        id: deployment
        with:
          step: start
          token: ${{ github.token }}
          env: ${{ env.PANTHEON_TARGET_ENV }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Configure SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
            ssh-private-key: ${{ inputs.ssh_key }}

      - name: Set up host keys for Pantheon
        shell: bash
        env:
          SSH_KEY: ${{ inputs.ssh_key }}
        run: ${{ github.workspace }}/scripts/main.sh setup_ssh_hostkeys

      - name: Check for Terminus
        if: ${{ inputs.skip_terminus_install != 'true' }}
        id: check_terminus
        shell: bash
        run: |
          if command -v terminus &> /dev/null; then
            echo "Terminus detected. Skipping Terminus installation."
            echo "should_install_terminus=false" >> $GITHUB_OUTPUT
          else
            echo "Terminus not installed, proceeding to install."
            echo "should_install_terminus=true" >> $GITHUB_OUTPUT
          fi

      - name: Install Terminus
        if: ${{ inputs.skip_terminus_install != 'true' && steps.check_terminus.outputs.should_install_terminus == 'true' }}
        uses: pantheon-systems/terminus-github-actions@v1
        with:
          pantheon-machine-token: ${{ inputs.machine_token }}

      - name: Check live environment
        if: ${{ inputs.skip_build_tools != 'true' }}
        shell: bash
        id: check_live_env
        env:
          PANTHEON_SITE: ${{ inputs.site }}
        run: |
          # Check if live environment exists
          set +e
          LIVE_INITIALIZED=$(terminus env:info ${PANTHEON_SITE}.live --field=initialized)
          if [ "$LIVE_INITIALIZED" == "1" ]; then
            echo "Live environment exists and is initialized."
            echo "live_env_exists=true" >> $GITHUB_OUTPUT
          else
            echo "Live environment is not initialized."
            echo "[alert] Workflow will proceed without Build Tools operations that depend on live environment. You will need to clone content manually to the multidev if required."
            echo "live_env_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Terminus Plugin
        shell: bash
        if: ${{ inputs.skip_build_tools != 'true' && steps.check_live_env.outputs.live_env_exists == 'true' }}
        env:
          BUILD_TOOLS_VERSION_INPUT: ${{ inputs.build_tools_version }}
        run: |
          BUILD_TOOLS_VERSION="${BUILD_TOOLS_VERSION_INPUT}"
          if [ -z "$BUILD_TOOLS_VERSION" ]; then
            echo "Installing latest stable version of Terminus Build Tools plugin"
            terminus self:plugin:install pantheon-systems/terminus-build-tools-plugin
          else
            echo "Installing specified version (${BUILD_TOOLS_VERSION}) of Terminus Build Tools plugin"
            terminus self:plugin:install "pantheon-systems/terminus-build-tools-plugin:${BUILD_TOOLS_VERSION}"
          fi

      - name: Configure Git User
        shell: bash
        env:
          PANTHEON_GIT_USER_NAME: ${{ inputs.git_user_name }}
          PANTHEON_GIT_USER_EMAIL: ${{ inputs.git_user_email }}
        run: |
          # Configure Git User
          set +e
          git config --global user.email "${PANTHEON_GIT_USER_EMAIL}"
          git config --global user.name "${PANTHEON_GIT_USER_NAME}"

      - name: Prepare site root
        shell: bash
        env:
          SITE_ROOT: ${{ inputs.relative_site_root }}
          PANTHEON_SITE: ${{ inputs.site }}
          PANTHEON_SOURCE_ENV: ${{ inputs.source_env }}
        run: |
          # Prepare site root
          set +e
          if [ -n "$SITE_ROOT" ]; then
            echo "Preparing site from relative path: ${SITE_ROOT}"

            # Get the Pantheon site ID
            SITE_ID=$(terminus site:info ${PANTHEON_SITE} --field=id)

            # Determine which environment to clone from
            # If target is dev, clone from master; otherwise clone from target or source env
            if [ "$PANTHEON_TARGET_ENV" == "dev" ]; then
              CLONE_BRANCH="master"
            else
              # For multidevs, check if it exists, otherwise use source env
              if terminus multidev:list ${PANTHEON_SITE} --format=list | grep -q "^${PANTHEON_TARGET_ENV}$"; then
                CLONE_BRANCH="${PANTHEON_TARGET_ENV}"
              else
                # Multidev doesn't exist yet, clone from source env
                # Map standard environments to master branch
                if [ "${PANTHEON_SOURCE_ENV}" == "live" ] || [ "${PANTHEON_SOURCE_ENV}" == "dev" ] || [ "${PANTHEON_SOURCE_ENV}" == "test" ]; then
                  CLONE_BRANCH="master"
                else
                  CLONE_BRANCH="${PANTHEON_SOURCE_ENV}"
                fi
              fi
            fi

            echo "Cloning Pantheon repository from branch: ${CLONE_BRANCH}"

            # Create a temporary directory for the Pantheon repo
            PANTHEON_REPO_DIR=$(mktemp -d)

            # Clone the Pantheon repository
            git clone --branch ${CLONE_BRANCH} \
              ssh://codeserver.dev.${SITE_ID}@codeserver.dev.${SITE_ID}.drush.in:2222/~/repository.git \
              ${PANTHEON_REPO_DIR}

            # Copy files from SITE_ROOT to the Pantheon repo (overwriting)
            echo "Copying files from ${SITE_ROOT} to Pantheon repository"
            rsync -av --delete --exclude='.git' ${SITE_ROOT}/ ${PANTHEON_REPO_DIR}/

            # Move into the Pantheon repo directory for subsequent steps
            cd ${PANTHEON_REPO_DIR}

            # Add the GitHub origin for Build Tools compatibility
            echo "Setting GitHub origin for Build Tools compatibility"
            if git remote | grep origin; then
              ORIGIN_URL=$(git remote get-url origin)
              if [[ "$ORIGIN_URL" != https://github.com/* ]]; then
                echo "Updating origin to GitHub URL"
                git remote remove origin
                git remote add origin https://github.com/${{ github.repository }}
              fi
            else
              echo "Adding origin to GitHub URL"
              git remote add origin https://github.com/${{ github.repository }}
            fi

            # Stage all changes
            git add -A

            # Export the Pantheon repo path for the next step
            echo "PANTHEON_REPO_DIR=${PANTHEON_REPO_DIR}" >> $GITHUB_ENV

          else
            git fetch --unshallow origin
          fi


      - name: Deployment Processing
        shell: bash
        id: deploy_to_pantheon
        env:
          PANTHEON_SITE: ${{ inputs.site }}
          PANTHEON_SOURCE_ENV: ${{ inputs.source_env }}
          SITE_ROOT: ${{ inputs.relative_site_root }}
          PANTHEON_COMMIT_MESSAGE: ${{ inputs.git_commit_message }}
          GITHUB_TOKEN: ${{ github.token }}
          SKIP_BUILD_TOOLS: ${{ inputs.skip_build_tools }}
          LIVE_ENV_EXISTS: ${{ steps.check_live_env.outputs.live_env_exists }}
          # todo, might need to make this configurable too.
          # the default in build tools is 180. But that's regularly failing
          # on a small personal site.
          TERMINUS_BUILD_TOOLS_WORKFLOW_TIMEOUT: 300
        run: |
          # Push to Pantheon
          set +e

          # If relative_site_root was used, change to the cloned Pantheon repo directory
          if [ -n "$PANTHEON_REPO_DIR" ]; then
            cd ${PANTHEON_REPO_DIR}
          fi

          if [ "$SKIP_BUILD_TOOLS" == "true" ] || [ "$LIVE_ENV_EXISTS" == "false" ]; then
            SITE_ID=$(terminus site:info ${PANTHEON_SITE} --field=id)

            # Are we pushing to a multidev or to dev?
            if [ "$PANTHEON_TARGET_ENV" == "dev" ]; then
              PANTHEON_DESTINATION_BRANCH="master"
              echo "Target environment is dev, pushing to 'master' branch on Pantheon."
            else
              PANTHEON_DESTINATION_BRANCH="${PANTHEON_TARGET_ENV}"
              echo "Target environment is ${PANTHEON_TARGET_ENV}, pushing to branch with the same name on Pantheon."
              # Check if a multidev already exists for this PR.
              if terminus multidev:list ${PANTHEON_SITE} --format=list | grep -q "^${PANTHEON_TARGET_ENV}$"; then
                echo "Multidev environment ${PANTHEON_TARGET_ENV} already exists. Pushing code to existing environment."
              else
                echo "Creating new multidev environment: ${PANTHEON_TARGET_ENV}"
                terminus multidev:create ${PANTHEON_SITE}.${PANTHEON_SOURCE_ENV} ${PANTHEON_TARGET_ENV} --yes
              fi
            fi

            # Ensure repo is not shallow; Pantheon rejects shallow pushes
            if git rev-parse --is-shallow-repository >/dev/null 2>&1 && [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
              echo "Repository is shallow; unshallowing before push."
              git fetch --unshallow origin || git fetch --depth=1000000 origin
            fi

            # Commit staged changes if any (from relative_site_root preparation)
            if ! git diff --cached --quiet; then
              git commit -m "${PANTHEON_COMMIT_MESSAGE}"
            fi

            # Add pantheon remote if it doesn't exist
            if ! git remote | grep -q pantheon; then
              git remote add pantheon ssh://codeserver.dev.${SITE_ID}@codeserver.dev.${SITE_ID}.drush.in:2222/~/repository.git
            fi

            # Push code to Pantheon
            git push pantheon HEAD:refs/heads/${PANTHEON_DESTINATION_BRANCH} --force
            exit 0
          fi

          terminus -n build:env:create ${PANTHEON_SITE}.${PANTHEON_SOURCE_ENV} ${PANTHEON_TARGET_ENV} --yes --message="${PANTHEON_COMMIT_MESSAGE}" ${PANTHEON_CLONE_CONTENT_FLAG}

      - name: Update deployment status
        uses: bobheadxi/deployments@v1
        if: always()
        with:
          step: finish
          token: ${{ github.token }}
          status: ${{ job.status }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          # todo, how does this work when there is a step above with the id of "deployment" not "deployment_id"
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}
          env: ${{ env.PANTHEON_TARGET_ENV }}
          env_url: https://${{ env.PANTHEON_TARGET_ENV }}-${{ inputs.site }}.pantheonsite.io
      - name: Deleting old multidevs
        if: ${{ inputs.delete_old_environments == 'true' && steps.deploy_to_pantheon.outcome == 'success' }}
        shell: bash
        env:
          DELETE_OLD_MULTIDEVS: ${{ inputs.delete_old_environments }}
          PANTHEON_SITE: ${{ inputs.site }}
          GITHUB_TOKEN: ${{ github.token }}
          SITE_ROOT: ${{ inputs.relative_site_root }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          MULTIDEV_DELETE_PATTERN: pr-
          PANTHEON_TARGET_ENV: ${{ env.PANTHEON_TARGET_ENV }}
          WORKSPACE: ${{ github.workspace }}
        run: $GITHUB_ACTION_PATH/scripts/cleanup.sh
